<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego Cazando</title>
  <link rel="stylesheet" href="cazando.css">
</head>
<body>
  <h1>Juego Cazando</h1>
  <p>Autor: Francisco Rodríguez</p>
  <h3>Alimenta al gato</h3>

  <div class="game-container">
    <canvas id="areaJuego" width="500" height="500"></canvas>
    <div class="controles">
      <div class="dpad">
        <button class="dir-btn up" id="btnArriba">⬆</button>
        <button class="dir-btn left" id="btnIzquierda">⬅</button>
        <button class="dir-btn right" id="btnDerecha">➡</button>
        <button class="dir-btn down" id="btnAbajo">⬇</button>
      </div>
      <button class="reset-btn" id="btnReiniciar">🔄 Reiniciar</button>
    </div>
  </div>

  <div class="panel">
    <span>🐟 Pescados: <span id="puntos">0</span></span>
    <span>⏱️ Tiempo: <span id="tiempo">10</span></span>
  </div>
  <p id="mensaje"></p>

  <script src="cazando.js"></script>
</body>
</html>
