<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="cazando.css" />
  <script src="utils.js"></script>
  <title>Juego Cazando</title>
</head>
<body onload="iniciarJuego();">
  <h1>Juego Cazando</h1>
  <p>Autor: Francisco Rodríguez</p>
  <h3>Alimenta a este gato hambriento</h3>

  <div class="game-container">
    <canvas id="areaJuego" width="500" height="500"></canvas>

    <div class="controles">
      <div class="dpad">
        <button class="dir-btn up" onclick="moverArriba()">⬆</button>
        <button class="dir-btn left" onclick="moverIzquierda()">⬅</button>
        <button class="dir-btn right" onclick="moverDerecha()">➡</button>
        <button class="dir-btn down" onclick="moverAbajo()">⬇</button>
      </div>
      <button class="reset-btn" onclick="reiniciarJuego()">🔄 Reiniciar</button>
    </div>
  </div>

  <div class="panel">
    <span>🐟 Pescados: <span id="puntos">0</span></span>
    <span>⏱️ Tiempo: <span id="tiempo">25</span></span>
  </div>

  <p id="mensaje"></p>

  <script src="cazando.js"></script>
</body>
</html>
